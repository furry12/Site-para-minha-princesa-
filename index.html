<!DOCTYPE html><html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Drika ❤️</title>
<script src="https://cdn.tailwindcss.com"></script><style>
body{
  margin:0;
  background: radial-gradient(circle at 30% 30%, #3a0ca3 0%, #000 60%),
              radial-gradient(circle at 70% 60%, #7209b7 0%, transparent 60%),
              #0b0015;
  color:#fff;
  font-family:sans-serif;
  overflow-x:hidden;
  overflow-y:auto;
}

/* ESTRELAS */
.stars{
  position:fixed;
  width:100%;
  height:100%;
  background:transparent;
  z-index:0;
}

.stars::after{
  content:"";
  position:absolute;
  width:2px;
  height:2px;
  background:white;
  box-shadow:
    50px 100px #c77dff,
    150px 200px #fff,
    250px 300px #9d4edd,
    350px 400px #fff,
    450px 150px #c77dff,
    550px 250px #fff,
    650px 350px #9d4edd;
  animation: moveStars 40s linear infinite;
}

@keyframes moveStars{
  from{transform:translateY(0)}
  to{transform:translateY(-1000px)}
}

/* LINHA */
.progress-line{
  position:fixed;
  left:50%;
  top:0;
  width:3px;
  height:100%;
  background:linear-gradient(#c77dff,#e0aaff);
  transform:translateX(-50%);
  box-shadow:0 0 15px #c77dff;
  z-index:1;
}

/* ETAPAS COMO PLACA */
.container{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
  position:relative;
  z-index:2;
}

.panel{
  background: rgba(20, 0, 40, 0.6);
  border:1px solid rgba(199,125,255,0.5);
  border-radius:20px;
  padding:20px;
  backdrop-filter: blur(10px);
  box-shadow:0 0 25px rgba(199,125,255,0.5);
  max-width:300px;
}

.title{
  font-size:1.9rem;
  font-weight:bold;
  background:linear-gradient(90deg,#c77dff,#e0aaff);
  -webkit-background-clip:text;
  color:transparent;
}

.carousel{
  width:200px;
  height:260px;
  overflow:hidden;
  border-radius:15px;
  position:relative;
}

.carousel img{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:0;
  transition:0.6s;
}

.carousel img.active{
  opacity:1;
}

.typing{
  line-height:1.6;
}

.btn{
  padding:10px 18px;
  border-radius:20px;
  background:linear-gradient(90deg,#c77dff,#e0aaff);
  box-shadow:0 0 15px #c77dff;
}

.heart{
  position:fixed;
  color:#c77dff;
  animation:float 5s linear infinite;
}

@keyframes float{
  from{transform:translateY(100vh)}
  to{transform:translateY(-10vh)}
}

</style></head><body><div class="stars"></div>
<div class="progress-line"></div><div class="container">
  <div class="panel">
    <h1 class="title">Para Drika, minha princesa ❤️</h1>
    <p>5 meses e 20 dias ao seu lado</p>
  </div>
</div><div class="container">
  <div class="panel">
    <div class="carousel">
      <img src="foto1.jpg" class="active">
      <img src="foto2.jpg">
      <img src="foto3.jpg">
    </div>
  </div>
</div><div class="container">
  <div class="panel">
    <h2>Uma mensagem 💌</h2>
    <p id="text" class="typing"></p>
  </div>
</div><div class="container">
  <div class="panel">
    <button class="btn" onclick="surpresa()">Clique aqui 💖</button>
    <p id="surpresa" style="opacity:0;">Você é o melhor capítulo da minha vida... te amarei pra todo sempre ❤️</p>
  </div>
</div><div class="container">
  <div class="panel">
    <audio id="audio" controls>
      <source src="musica.mp3" type="audio/mpeg">
    </audio>
  </div>
</div><script>

const imgs = document.querySelectorAll('.carousel img');
let index = 0;

setInterval(()=>{
  imgs[index].classList.remove('active');
  index = (index + 1) % imgs.length;
  imgs[index].classList.add('active');
},2000);

const msg = "Desde que você entrou na minha vida, tudo mudou completamente. Você trouxe uma felicidade que eu nunca senti antes, uma paz que eu nem sabia que precisava. Cada momento ao seu lado é especial, cada sorriso seu ilumina meu dia. Eu te amo de uma forma que palavras nunca vão conseguir explicar totalmente. Você é, sem dúvida, a melhor coisa que já aconteceu na minha vida ❤️";

let i=0;
function typing(){
  if(i<msg.length){
    document.getElementById('text').innerHTML += msg.charAt(i);
    i++;
    setTimeout(typing,25);
  }
}
typing();

function surpresa(){
  document.getElementById('surpresa').style.opacity=1;
  document.getElementById('audio').play();
}

setInterval(()=>{
  const h=document.createElement('div');
  h.className='heart';
  h.style.left=Math.random()*100+'vw';
  h.innerHTML='💜';
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),5000);
},400);

</script></body>
</html>
