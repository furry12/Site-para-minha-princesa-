<!DOCTYPE html><html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Drika ❤️</title>
<script src="https://cdn.tailwindcss.com"></script><style>
body{
  margin:0;
  background:#0b0015;
  color:#fff;
  font-family:sans-serif;
  overflow-x:hidden;
  overflow-y:auto;
}

/* GALAXIA REAL */
body::before{
  content:"";
  position:fixed;
  width:200%;
  height:200%;
  background:
    radial-gradient(2px 2px at 20% 30%, #c77dff, transparent),
    radial-gradient(2px 2px at 70% 60%, #e0aaff, transparent),
    radial-gradient(2px 2px at 40% 80%, #9d4edd, transparent);
  animation: move 60s linear infinite;
  z-index:0;
}

@keyframes move{
  from{transform:translate(0,0)}
  to{transform:translate(-300px,-300px)}
}

/* LINHA */
.progress-line{
  position:fixed;
  left:50%;
  top:0;
  width:3px;
  height:100%;
  background:#c77dff;
  transform:translateX(-50%);
  box-shadow:0 0 15px #c77dff;
  z-index:1;
}

/* ETAPAS */
.container{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
  position:relative;
  z-index:2;
}

/* CIRCULO DESTACADO */
.container::before{
  content:"";
  position:absolute;
  width:260px;
  height:260px;
  border:2px solid #c77dff;
  border-radius:50%;
  box-shadow:0 0 20px #c77dff;
  animation:pulse 2s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);opacity:0.6}
  50%{transform:scale(1.1);opacity:1}
  100%{transform:scale(1);opacity:0.6}
}

.title{
  font-size:2rem;
  font-weight:bold;
  background:linear-gradient(90deg,#c77dff,#e0aaff);
  -webkit-background-clip:text;
  color:transparent;
}

.carousel{
  width:200px;
  height:260px;
  overflow:hidden;
  border-radius:20px;
  box-shadow:0 0 25px rgba(199,125,255,0.6);
  position:relative;
}

.carousel img{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:0;
  transition:0.6s;
}

.carousel img.active{
  opacity:1;
}

.typing{
  max-width:260px;
  line-height:1.6;
}

.btn{
  padding:10px 18px;
  border-radius:20px;
  background:linear-gradient(90deg,#c77dff,#e0aaff);
  box-shadow:0 0 15px #c77dff;
}

.heart{
  position:fixed;
  color:#c77dff;
  animation:float 5s linear infinite;
}

@keyframes float{
  from{transform:translateY(100vh)}
  to{transform:translateY(-10vh)}
}

</style></head><body><div class="progress-line"></div><div class="container">
  <h1 class="title">Para Drika, minha princesa ❤️</h1>
  <p>5 meses e 20 dias ao seu lado</p>
</div><div class="container">
  <div class="carousel">
    <img src="foto1.jpg" class="active">
    <img src="foto2.jpg">
    <img src="foto3.jpg">
  </div>
</div><div class="container">
  <h2>Uma mensagem 💌</h2>
  <p id="text" class="typing"></p>
</div><div class="container">
  <button class="btn" onclick="surpresa()">Clique aqui 💖</button>
  <p id="surpresa" style="opacity:0;">Você é o melhor capítulo da minha vida... te amarei pra todo sempre ❤️</p>
</div><div class="container">
  <audio id="audio" controls>
    <source src="musica.mp3" type="audio/mpeg">
  </audio>
</div><script>

const imgs = document.querySelectorAll('.carousel img');
let index = 0;

setInterval(()=>{
  imgs[index].classList.remove('active');
  index = (index + 1) % imgs.length;
  imgs[index].classList.add('active');
},2000);

const msg = "Desde que você entrou na minha vida, tudo mudou completamente. Você trouxe uma felicidade que eu nunca senti antes, uma paz que eu nem sabia que precisava. Cada momento ao seu lado é especial, cada sorriso seu ilumina meu dia. Eu te amo de uma forma que palavras nunca vão conseguir explicar totalmente. Você é, sem dúvida, a melhor coisa que já aconteceu na minha vida ❤️";

let i=0;
function typing(){
  if(i<msg.length){
    document.getElementById('text').innerHTML += msg.charAt(i);
    i++;
    setTimeout(typing,25);
  }
}
typing();

function surpresa(){
  document.getElementById('surpresa').style.opacity=1;
  document.getElementById('audio').play();
}

setInterval(()=>{
  const h=document.createElement('div');
  h.className='heart';
  h.style.left=Math.random()*100+'vw';
  h.innerHTML='💜';
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),5000);
},400);

</script></body>
</html>
