<!DOCTYPE html><html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Drika ❤️</title><style>
html{
  scroll-behavior:smooth;
}

body{
  margin:0;
  background:#0b0015;
  color:#fff;
  font-family:sans-serif;
  overflow-x:hidden;
}

/* GALAXIA PROFUNDA */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 20%, #3a0ca3, transparent 40%),
    radial-gradient(circle at 80% 40%, #7209b7, transparent 40%),
    radial-gradient(circle at 50% 80%, #560bad, transparent 40%);
  animation: move 40s linear infinite;
  z-index:0;
}

@keyframes move{
  from{transform:translate(0,0)}
  to{transform:translate(-200px,-200px)}
}

/* LINHA PREMIUM COM PULSE */
.progress-line{
  position:fixed;
  left:50%;
  top:0;
  width:3px;
  height:100vh;
  background:#c77dff;
  transform:translateX(-50%);
  box-shadow:0 0 20px #c77dff;
  animation:pulseLine 2s infinite alternate;
  z-index:1;
}

@keyframes pulseLine{
  from{box-shadow:0 0 10px #c77dff}
  to{box-shadow:0 0 30px #e0aaff}
}

/* SCROLL SNAP */
.container{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  scroll-snap-align:center;
  position:relative;
  z-index:2;
}

body{
  scroll-snap-type:y mandatory;
}

/* PAINEL PREMIUM */
.panel{
  background:rgba(20,0,40,0.35);
  backdrop-filter: blur(22px);
  border:2px solid rgba(199,125,255,0.6);
  border-radius:30px;
  padding:30px;
  box-shadow:0 0 40px rgba(199,125,255,0.6);
  text-align:center;
  transition:0.4s;
}

.panel:hover{
  transform:scale(1.03);
  box-shadow:0 0 60px rgba(199,125,255,0.9);
}

.title{
  font-size:2.2rem;
  background:linear-gradient(90deg,#c77dff,#e0aaff);
  -webkit-background-clip:text;
  color:transparent;
}

.carousel img{
  width:220px;
  height:280px;
  object-fit:cover;
  display:none;
  border-radius:20px;
  cursor:pointer;
  transition:0.4s;
}

.carousel img.active{
  display:block;
  transform:scale(1.05);
}

.btn{
  padding:14px 22px;
  background:linear-gradient(90deg,#c77dff,#e0aaff);
  border-radius:25px;
  cursor:pointer;
  box-shadow:0 0 20px #c77dff;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.1);
}

/* MODAL FINAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  backdrop-filter: blur(25px);
  display:flex;
  justify-content:center;
  align-items:center;
  opacity:0;
  pointer-events:none;
  transition:0.5s;
}

.modal.show{
  opacity:1;
  pointer-events:all;
}

.modal-content{
  background:#140020;
  padding:30px;
  border-radius:25px;
  border:2px solid #c77dff;
  box-shadow:0 0 60px #c77dff;
  transform:scale(0.5);
  opacity:0;
  animation:zoomIn 0.6s forwards;
}

@keyframes zoomIn{
  to{transform:scale(1);opacity:1}
}

</style></head><body><div class="progress-line"></div><section class="container">
  <div class="panel">
    <h1 class="title">Para Drika, minha princesa ❤️</h1>
    <p>5 meses e 20 dias ao seu lado</p>
  </div>
</section><section class="container">
  <div class="panel">
    <div class="carousel">
      <img src="foto1.jpg" class="active" onclick="abrirImg(this.src)">
      <img src="foto2.jpg" onclick="abrirImg(this.src)">
      <img src="foto3.jpg" onclick="abrirImg(this.src)">
    </div>
  </div>
</section><section class="container">
  <div class="panel">
    <h2>Uma mensagem 💌</h2>
    <p id="text"></p>
  </div>
</section><section class="container">
  <div class="panel">
    <button class="btn" onclick="abrirSurpresa()">Abrir surpresa 💖</button>
  </div>
</section><div id="modal" class="modal" onclick="fecharModal()">
  <div class="modal-content" onclick="event.stopPropagation()">
    <p id="surpresaText"></p>
  </div>
</div><audio id="audio">
  <source src="musica.mp3" type="audio/mpeg">
</audio><script>
const imgs=document.querySelectorAll('.carousel img');
let i=0;
setInterval(()=>{
  imgs[i].classList.remove('active');
  i=(i+1)%imgs.length;
  imgs[i].classList.add('active');
},2000);

const texto="Desde que você entrou na minha vida, tudo mudou completamente... você é a melhor coisa que já aconteceu comigo ❤️";
let t=0;
function typing(){
  if(t<texto.length){
    document.getElementById('text').innerHTML+=texto[t];
    t++;
    setTimeout(typing,25);
  }
}
typing();

function abrirSurpresa(){
  const modal=document.getElementById('modal');
  const texto="Você é o melhor capítulo da minha vida... te amarei pra todo sempre ❤️";
  let j=0;
  document.getElementById('surpresaText').innerHTML="";
  modal.classList.add('show');

  function escrever(){
    if(j<texto.length){
      document.getElementById('surpresaText').innerHTML+=texto[j];
      j++;
      setTimeout(escrever,30);
    }else{
      document.getElementById('audio').play();
    }
  }
  escrever();
}

function fecharModal(){
  document.getElementById('modal').classList.remove('show');
}
</script></body>
</html>
