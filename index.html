<!DOCTYPE html><html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Drika ❤️</title><style>
body{
  margin:0;
  font-family:sans-serif;
  color:#fff;
  background:#0a0018;
  overflow-x:hidden;
}

/* FUNDO ESTRELADO REAL */
.stars{
  position:fixed;
  width:100%;
  height:100%;
  background:transparent;
  z-index:0;
}

.stars::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background-image:
    radial-gradient(2px 2px at 10% 20%, #fff, transparent),
    radial-gradient(1.5px 1.5px at 30% 70%, #c77dff, transparent),
    radial-gradient(2px 2px at 50% 40%, #fff, transparent),
    radial-gradient(1px 1px at 80% 10%, #e0aaff, transparent),
    radial-gradient(2px 2px at 90% 80%, #fff, transparent),
    radial-gradient(1.5px 1.5px at 60% 60%, #c77dff, transparent),
    radial-gradient(2px 2px at 25% 85%, #fff, transparent),
    radial-gradient(1px 1px at 75% 50%, #e0aaff, transparent);
  animation:starsMove 80s linear infinite;
  opacity:0.9;
}

@keyframes starsMove{
  from{transform:translateY(0)}
  to{transform:translateY(-1000px)}
}

/* LINHA CONECTANDO OS CARDS */
.timeline{
  position:fixed;
  left:50%;
  top:0;
  width:3px;
  height:100%;
  background:transparent;
  z-index:1;
}

.timeline::before{
  content:"";
  position:absolute;
  top:160px;
  left:50%;
  width:4px;
  height:calc(100% - 160px);
  background:linear-gradient(to bottom, transparent, #c77dff 10%, #c77dff 90%, transparent);
  transform:translateX(-50%);
  box-shadow:0 0 25px #c77dff;
  z-index:-1;
}

/* NÓS QUE CONECTAM NAS PLACAS */
.node{
  position:absolute;
  left:50%;
  width:18px;
  height:18px;
  background:#c77dff;
  border-radius:50%;
  transform:translate(-50%, -50%);
  box-shadow:0 0 20px #c77dff, 0 0 40px #e0aaff;
  animation:pulseNode 2s infinite alternate;
  z-index:3;
}

@keyframes pulseNode{
  from{box-shadow:0 0 10px #c77dff}
  to{box-shadow:0 0 30px #e0aaff}
}

/* CONEXÃO ENTRE ETAPAS */
.node{
  position:absolute;
  left:50%;
  width:16px;
  height:16px;
  background:#c77dff;
  border-radius:50%;
  transform:translateX(-50%);
  box-shadow:0 0 15px #c77dff;
}

.container{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
  z-index:2;
}

.panel{
  position:relative;
  background:rgba(30,0,60,0.6);
  backdrop-filter: blur(18px);
  border:2px solid #c77dff;
  border-radius:30px;
  padding:30px;
  box-shadow:0 0 40px rgba(199,125,255,0.6);
  text-align:center;
  max-width:320px;
}

.title{
  font-size:2rem;
  background:linear-gradient(90deg,#c77dff,#e0aaff);
  -webkit-background-clip:text;
  color:transparent;
}

.carousel img{
  width:220px;
  height:280px;
  object-fit:cover;
  display:none;
  border-radius:20px;
}

.carousel img.active{
  display:block;
}

.btn{
  padding:12px 20px;
  background:#c77dff;
  border-radius:20px;
  cursor:pointer;
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  backdrop-filter: blur(25px);
  display:flex;
  justify-content:center;
  align-items:center;
  opacity:0;
  pointer-events:none;
  transition:0.4s;
  z-index:999;
}

.modal.show{
  opacity:1;
  pointer-events:all;
}

.modal-content{
  background:#140020;
  padding:30px;
  border-radius:25px;
  border:2px solid #c77dff;
  box-shadow:0 0 50px #c77dff;
}

</style></head><body><div class="stars"></div>
<div class="timeline"></div><section class="container">
  <div class="node"></div>
  <div class="panel">
    <h1 class="title">Para Drika, minha princesa ❤️</h1>
    <p>5 meses e 20 dias ao seu lado</p>
  </div>
</section><section class="container">
  <div class="node"></div>
  <div class="panel">
    <div class="carousel">
      <img src="foto1.jpg" class="active">
      <img src="foto2.jpg">
      <img src="foto3.jpg">
    </div>
  </div>
</section><section class="container">
  <div class="node"></div>
  <div class="panel">
    <h2>Uma mensagem 💌</h2>
    <p id="text"></p>
  </div>
</section><section class="container">
  <div class="node"></div>
  <div class="panel">
    <button class="btn" onclick="abrirSurpresa()">Abrir surpresa 💖</button>
  </div>
</section><div id="modal" class="modal" onclick="fecharModal()">
  <div class="modal-content" onclick="event.stopPropagation()">
    <p id="surpresaText"></p>
  </div>
</div><audio id="audio">
  <source src="musica.mp3" type="audio/mpeg">
</audio><script>
// TEXTO
const texto="Desde que você entrou na minha vida, tudo mudou completamente... você é a melhor coisa que já aconteceu comigo ❤️";
let t=0;
function typing(){
  if(t<texto.length){
    document.getElementById('text').innerHTML+=texto[t];
    t++;
    setTimeout(typing,25);
  }
}
typing();

// CARROSSEL
const imgs=document.querySelectorAll('.carousel img');
let i=0;
setInterval(()=>{
  imgs[i].classList.remove('active');
  i=(i+1)%imgs.length;
  imgs[i].classList.add('active');
},2000);

// MODAL
function abrirSurpresa(){
  const modal=document.getElementById('modal');
  const texto="Você é o melhor capítulo da minha vida... te amarei pra todo sempre ❤️";
  let j=0;
  document.getElementById('surpresaText').innerHTML="";
  modal.classList.add('show');

  function escrever(){
    if(j<texto.length){
      document.getElementById('surpresaText').innerHTML+=texto[j];
      j++;
      setTimeout(escrever,30);
    }else{
      document.getElementById('audio').play();
    }
  }
  escrever();
}

function fecharModal(){
  document.getElementById('modal').classList.remove('show');
}
</script></body>
</html>
